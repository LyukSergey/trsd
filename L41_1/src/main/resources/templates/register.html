<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; }
        h1 { color: #1976d2; }
        form { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { display: block; width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box;
                border: 1px solid #ccc; border-radius: 4px; }
        button { display: block; width: 100%; padding: 12px; margin-top: 20px; background: #1976d2;
                 color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background: #1565c0; }
        .message { padding: 15px; border-radius: 5px; margin-bottom: 15px; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        .login-link { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>Реєстрація нового користувача</h1>

    <div class="message success" th:if="${success}" th:text="${success}"></div>
    <div class="message error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/register}" method="POST">
        <label>Username:</label>
        <input type="text" name="username" placeholder="mylogin" required>

        <label>Password:</label>
        <input type="password" name="password" placeholder="мінімум 6 символів" required>

        <label>Ім'я:</label>
        <input type="text" name="firstName" placeholder="Тарас" required>

        <label>Прізвище:</label>
        <input type="text" name="lastName" placeholder="Бондаренко" required>

        <button type="submit">Зареєструватись</button>
    </form>

    <div class="login-link">
        Вже маєте акаунт? <a href="/login">Увійти</a>
    </div>
</body>
</html>

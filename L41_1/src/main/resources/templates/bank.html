<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>MyBank - Переказ коштів</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; }
        .balance { font-size: 24px; color: #2e7d32; margin: 20px 0; }
        .message { background: #e8f5e9; padding: 15px; border-radius: 5px; margin: 15px 0; }
        .message.error { background: #ffebee; }
        form { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        input, button { display: block; width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #1976d2; color: white; border: none; cursor: pointer; border-radius: 4px; }
        h1 { color: #1976d2; }
        .csrf-info { background: #fff3e0; padding: 10px; border-radius: 5px; margin-top: 20px; font-size: 13px; }
        code { background: #eee; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>MyBank</h1>
    <p>Користувач: <strong th:text="${user.firstName + ' ' + user.lastName}"></strong></p>
    <div class="balance">Баланс: <span th:text="${user.balance}"></span> грн</div>

    <div class="message" th:if="${message}" th:text="${message}"></div>

    <form th:action="@{/transfer}" method="POST">
        <!-- Thymeleaf додає _csrf автоматично коли використовується th:action -->
        <label>Рахунок отримувача:</label>
        <input type="text" name="to" placeholder="UA1234567890" required>
        <label>Сума (грн):</label>
        <input type="number" name="amount" placeholder="1000" required>
        <button type="submit">Переказати</button>
    </form>

    <div class="csrf-info">
        <strong>CSRF-токен у формі (для демонстрації):</strong><br>
        Thymeleaf + Spring Security автоматично додають приховане поле:<br>
        <code>&lt;input type="hidden" name="_csrf" value="..."&gt;</code><br>
        Подивіться у DevTools (F12 → Elements) — знайдіть це поле у формі.
    </div>
</body>
</html>
